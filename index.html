<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffc21f" />
<title>Happy Monthsary, Ms.D 🌻</title>
<style>
  /* ============================================================
     🌻 HAPPY MONTHSARY: a cute, self-contained greeting page.
     Sunflower theme (her favorites: yellow + sunflowers).
     Everything (style + script) lives in this one file so you can
     text the link, AirDrop the file, or screen-share it on iOS.
     To personalize, edit the CONFIG block in the <script> below.
     ============================================================ */
  :root {
    --butter:  #fff6d6;   /* soft sunlight */
    --sun:     #ffc21f;   /* sunflower petal yellow */
    --sun-dk:  #f0a500;   /* deep gold */
    --amber:   #cf7a08;   /* amber, accent text (readable on cream) */
    --seed:    #4a3218;   /* warm seed-brown ink */
    --leaf:    #6f9e4b;   /* sunflower-leaf green */
    --cream:   #fffdf5;   /* card */
    --paper:   #fffdf2;   /* note paper */
    --tape:    rgba(240, 165, 0, .5);
    --shadow:  0 18px 50px rgba(150, 100, 10, .26);
    --script:  "Snell Roundhand", "Bradley Hand", "Segoe Script", "Comic Sans MS", cursive;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--seed);
    background: radial-gradient(120% 90% at 50% 0%, var(--butter) 0%, #ffe58a 45%, #ffd23f 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    text-align: center;
  }

  /* ---- falling sunflowers / petals layer ---- */
  #fx { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .bloom {
    position: absolute; top: -8vh; font-size: 26px;
    animation: fall linear forwards; will-change: transform, opacity;
  }
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(115vh) rotate(320deg); opacity: 0; }
  }

  .card {
    background: var(--cream);
    border-radius: 28px;
    padding: 34px 26px 30px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,.7);
  }

  /* ---- start screen (tap to open): full-screen overlay ---- */
  #start {
    position: fixed; inset: 0; z-index: 5;
    display: grid; place-items: center; cursor: pointer;
    padding: 24px;
    background: radial-gradient(120% 90% at 50% 0%, var(--butter) 0%, #ffe58a 45%, #ffd23f 100%);
  }
  #start .card { width: min(440px, 92vw); }
  #start.hide { opacity: 0; visibility: hidden; transition: opacity .5s ease, visibility .5s; }
  .hero-bloom { font-size: 84px; line-height: 1; animation: bob 2.4s ease-in-out infinite;
                filter: drop-shadow(0 12px 18px rgba(200,140,0,.4)); }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }
  #start h1 { margin: 18px 0 6px; font-size: clamp(24px, 7vw, 34px); }
  #start p  { margin: 0; opacity: .8; font-size: 16px; }
  .pulse { display:inline-block; margin-top:14px; padding:10px 20px; border-radius:999px;
           background: var(--sun); color: var(--seed); font-weight:800; font-size:15px;
           box-shadow: 0 8px 20px rgba(200,140,0,.45); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ transform: scale(1) } 50%{ transform: scale(1.06) } }

  /* ---- main content (revealed after tap) ---- */
  #main { display: none; position: relative; z-index: 2; }
  #main.show { display: block; }

  /* greeting screen */
  .screen { min-height: 100dvh; display: grid; place-items: center;
            padding: calc(env(safe-area-inset-top) + 20px) 18px 24px; }
  #greeting .card { width: min(560px, 92vw); animation: pop .7s cubic-bezier(.2,.9,.3,1.3) both; }
  @keyframes pop { from{ transform: scale(.7); opacity:0 } to{ transform: scale(1); opacity:1 } }

  .eyebrow { letter-spacing: .18em; text-transform: uppercase; font-size: 12px;
             font-weight: 700; color: var(--amber); opacity:.95; }
  .title { margin: 8px 0 4px; font-size: clamp(30px, 9vw, 46px); line-height: 1.05;
           background: linear-gradient(90deg, var(--amber), var(--sun), var(--leaf));
           -webkit-background-clip: text; background-clip: text; color: transparent; }
  .subtitle { margin: 2px 0 18px; font-size: 18px; font-weight: 600; }
  .counter { display: flex; justify-content: center; gap: 10px; margin: 6px 0 20px; flex-wrap: wrap; }
  .pill { background: #fff2c4; border-radius: 16px; padding: 12px 14px; min-width: 78px; }
  .pill b { display:block; font-size: 26px; color: var(--amber); line-height:1; font-variant-numeric: tabular-nums; }
  .pill span { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; opacity: .75; }
  .message { font-size: 17px; line-height: 1.6; margin: 4px 6px 6px; white-space: pre-line; }
  .sign { margin-top: 16px; font-size: 18px; font-weight: 700; color: var(--amber); }

  .scroll-hint { margin-top: 22px; font-size: 14px; opacity: .85; color: var(--seed); text-decoration: none; }
  .scroll-hint .arrow { display: block; font-size: 22px; margin-top: 4px; animation: nudge 1.6s ease-in-out infinite; }
  @keyframes nudge { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(6px) } }

  /* ---- journal section ---- */
  #journal { padding: 10px 16px 70px; }
  .journal-head { margin: 8px auto 26px; }
  .journal-head h2 { font-family: var(--script); font-size: clamp(30px, 8vw, 44px);
                     color: var(--amber); margin: 0; }
  .journal-head p { margin: 4px 0 0; opacity: .8; font-size: 15px; }

  .entries { display: flex; flex-direction: column; gap: 34px; max-width: 720px; margin: 0 auto; }
  .entry { display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap; }
  .entry:nth-child(even) { flex-direction: row-reverse; }

  /* polaroid photo print */
  .polaroid { background: #fff; padding: 12px 12px 40px; border-radius: 4px;
              box-shadow: 0 14px 30px rgba(120,85,20,.28); position: relative;
              width: 220px; max-width: 78vw; transform: rotate(-3deg); flex: 0 0 auto; }
  .entry:nth-child(even) .polaroid { transform: rotate(3deg); }
  .polaroid::before { content: ""; position: absolute; top: -12px; left: 50%; transform: translateX(-50%) rotate(-4deg);
                      width: 92px; height: 26px; background: var(--tape);
                      box-shadow: 0 2px 4px rgba(0,0,0,.08); border-radius: 2px; }
  .photo { aspect-ratio: 4/5; border-radius: 2px; overflow: hidden; display: grid; place-items: center;
           background: linear-gradient(135deg, #fff2c4, #ffe58a); color: var(--amber); }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo .ph { display: flex; flex-direction: column; align-items: center; gap: 6px; opacity: .8; }
  .photo .ph .cam { font-size: 34px; }
  .photo .ph small { font-size: 11px; letter-spacing: .05em; }
  .polaroid .caption { font-family: var(--script); font-size: 20px; color: var(--seed);
                       position: absolute; left: 0; right: 0; bottom: 8px; }

  /* handwritten note beside the print */
  .note { font-family: var(--script); font-size: 20px; line-height: 1.5; color: var(--seed);
          background: var(--paper); border-radius: 10px; padding: 16px 18px;
          box-shadow: 0 8px 20px rgba(120,85,20,.16); max-width: 260px;
          background-image: repeating-linear-gradient(transparent, transparent 27px, rgba(111,158,75,.18) 28px);
          transform: rotate(1.5deg); flex: 1 1 220px; text-align: left; }
  .entry:nth-child(even) .note { transform: rotate(-1.5deg); }
  .note-date { display: block; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               font-size: 12px; letter-spacing: .08em; color: var(--amber); opacity: .85;
               margin-bottom: 6px; font-variant-numeric: tabular-nums; }

  .journal-foot { font-family: var(--script); font-size: 24px; color: var(--amber); margin: 40px 0 0; }

  /* ---- mute button (only shown if music is enabled) ---- */
  #mute { position: fixed; z-index: 6; right: 16px; top: calc(env(safe-area-inset-top) + 14px);
          display: none; width: 44px; height: 44px; border-radius: 50%; border: none;
          background: rgba(255,255,255,.9); font-size: 20px; cursor: pointer;
          box-shadow: 0 6px 16px rgba(200,140,0,.35); }

  :focus-visible { outline: 3px solid var(--amber); outline-offset: 3px; border-radius: 6px; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .hero-bloom, .pulse, .scroll-hint .arrow,
    #greeting .card, .bloom { animation: none; }
  }
</style>
</head>
<body>
  <div id="fx" aria-hidden="true"></div>
  <button id="mute" aria-label="Toggle music">🔊</button>

  <!-- Start screen (tap to open) -->
  <section id="start" role="button" tabindex="0" aria-label="Tap to open your surprise">
    <div class="card">
      <div class="hero-bloom">🌻</div>
      <h1>A little something for you…</h1>
      <p>tap to open your surprise</p>
      <div class="pulse">Open 🌻</div>
    </div>
  </section>

  <!-- Main content -->
  <main id="main">
    <!-- Greeting -->
    <section id="greeting" class="screen">
      <div class="card">
        <div class="eyebrow" id="eyebrow">For Ms.D</div>
        <h2 class="title" id="title">Happy Monthsary 🌻</h2>
        <div class="subtitle" id="subtitle"></div>
        <div class="counter" id="counter"></div>
        <p class="message" id="message"></p>
        <div class="sign" id="sign"></div>
        <a class="scroll-hint" href="#journal">
          our little journal
          <span class="arrow">↓</span>
        </a>
      </div>
    </section>

    <!-- Journal -->
    <section id="journal">
      <div class="journal-head">
        <h2 id="journal-title">Our Little Journal</h2>
        <p id="journal-sub">a few of my favorite moments with you 🌻</p>
      </div>
      <div class="entries" id="entries"></div>
      <p class="journal-foot" id="journal-foot"></p>
    </section>
  </main>

  <!-- Background song (set via CONFIG.MUSIC_SRC); starts on the open tap and loops. -->
  <audio id="song" loop preload="auto"></audio>

<script>
/* ============================================================
   ✏️  CONFIG: edit these to personalize your greeting.
   ============================================================ */
const CONFIG = {
  PARTNER_NAME:  "Ms.D",                    // what you call her (shown everywhere)
  ANNIVERSARY:   "2026-04-19",              // YYYY-MM-DD you got together
  MONTHS:        "auto",                     // a number, or "auto" to compute from the date
  SUBTITLE:      "to my sunshine 🌻",        // small line under the title
  MESSAGE:
`Happy monthsary, Ms.D. 🌻

Every single month with you feels like the best one yet.
You're my sunflower, always turning my gray days bright.
Thank you for your laugh, your hugs, and for choosing me
every day. I love you more than words fit here.`,
  SIGN:          "Always yours 🌻",          // your signature
  JOURNAL_FOOT:  "…and so many more to come. 💛",
  MUSIC_SRC:     "music/love-song.wav",      // background song; starts on the open tap

  /* Journal photo prints. Leave "src" empty to show a placeholder frame;
     add a filename (e.g. "photos/first-date.jpg") or a data: URI later.
     "caption" is the little label under the print; "note" is the handwritten note beside it. */
  JOURNAL: [
    { src: "photos/first-date.jpg",        date: "02-01-2026", caption: "our first date",        note: "The day it all began. I was so nervous, but that's when I decided I wanted to be with you. 🌻" },
    { src: "photos/first-valentines.jpg",  date: "14-02-2026", caption: "our first Valentine's", note: "My favorite Valentine, now and every year after. 💛" },
    { src: "photos/first-birthday.jpg",    date: "26-04-2026", caption: "your birthday",         note: "Your first birthday together. I just wanted to make your day as bright as you make mine." },
    { src: "photos/graduation.jpg",        date: "13-05-2026", caption: "graduation day",        note: "So proud of you, my brilliant sunflower. You did that. 🎓" },
    { src: "photos/first-trip-abroad.jpg", date: "28-06-2026", caption: "our first trip abroad", note: "An unforgettable adventure, with you right by my side. ✈️🌻" }
  ]
};
/* ============================================================ */

const $ = (id) => document.getElementById(id);
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function ordinal(n) {
  const s = ["th","st","nd","rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}
// Parse a YYYY-MM-DD anniversary; returns null if it's not a valid date (e.g.
// mistyped during personalization) so callers can fall back to 0 instead of NaN.
function parseDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return isNaN(d.getTime()) ? null : d;
}
function daysSince(dateStr, now = new Date()) {
  // Count whole *local* calendar days, but normalize each date to a UTC
  // midnight first so DST transitions (where a local day isn't exactly 24h)
  // can't shift the result by ±1. Local getFullYear/Month/Date is intentional
  // (not getUTC*) so the day flips at the user's local midnight.
  const start = parseDate(dateStr);
  if (!start) return 0;
  const startUTC = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
  const nowUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.max(0, Math.round((nowUTC - startUTC) / 86400000));
}
function monthsElapsed(dateStr, now = new Date()) {
  const start = parseDate(dateStr);
  if (!start) return 0;
  let m = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  if (now.getDate() < start.getDate()) m--;
  return Math.max(0, m);
}
function monthCount(now = new Date()) {
  if (CONFIG.MONTHS === "auto") return monthsElapsed(CONFIG.ANNIVERSARY, now);
  // Coerce to a non-negative integer so a stray string can't render as NaN or
  // inject markup when it flows into the counter's innerHTML.
  const n = Math.floor(Number(CONFIG.MONTHS));
  return Number.isFinite(n) && n >= 0 ? n : 0;
}

function buildCounter() {
  const days = daysSince(CONFIG.ANNIVERSARY);
  const cells = [
    [monthCount(), "Months"],
    [Math.floor(days / 7), "Weeks"],
    [days, "Days"],
  ];
  $("counter").innerHTML = cells
    .map(([n, label]) => `<div class="pill"><b>${n}</b><span>${label}</span></div>`)
    .join("");
}

// Escape values before they go into innerHTML so hand-written notes/captions
// with characters like < & " render literally (e.g. "I <3 you") and can never
// inject markup.
function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
  );
}

function buildJournal() {
  // Tolerate a hand-edited CONFIG where JOURNAL was removed or isn't an array.
  const entries = Array.isArray(CONFIG.JOURNAL) ? CONFIG.JOURNAL : [];
  $("entries").innerHTML = entries.map((e) => {
    const caption = escapeHtml(e.caption);
    const note = escapeHtml(e.note);
    const date = escapeHtml(e.date);
    const inner = e.src
      ? `<img src="${escapeHtml(e.src)}" alt="${caption || "our photo"}">`
      : `<div class="ph"><span class="cam">📷</span><small>add photo later</small></div>`;
    return `
      <div class="entry">
        <figure class="polaroid">
          <div class="photo">${inner}</div>
          <figcaption class="caption">${caption}</figcaption>
        </figure>
        <p class="note">${date ? `<span class="note-date">${date}</span>` : ""}${note}</p>
      </div>`;
  }).join("");
}

function fillContent() {
  $("title").textContent = `Happy ${ordinal(monthCount())} Monthsary 🌻`;
  $("eyebrow").textContent = `For ${CONFIG.PARTNER_NAME}`;
  $("subtitle").textContent = CONFIG.SUBTITLE;
  $("message").textContent = CONFIG.MESSAGE;
  $("sign").textContent = CONFIG.SIGN;
  $("journal-foot").textContent = CONFIG.JOURNAL_FOOT;
  buildCounter();
  buildJournal();
}

// ---- falling sunflowers / petals ----
const EMOJIS = ["🌻","🌼","💛","🌿","✨","🐝"];
function spawnBloom() {
  const el = document.createElement("div");
  el.className = "bloom";
  el.textContent = EMOJIS[(Math.random() * EMOJIS.length) | 0];
  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (16 + Math.random() * 26) + "px";
  const dur = 4 + Math.random() * 4;
  el.style.animationDuration = dur + "s";
  $("fx").appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 200);
}
function burst(n) { for (let i = 0; i < n; i++) setTimeout(spawnBloom, i * 40); }

// ---- music (iOS needs the first user tap to start audio) ----
function setupMusic() {
  if (!CONFIG.MUSIC_SRC) return null;
  const song = $("song");
  song.src = CONFIG.MUSIC_SRC;
  const btn = $("mute");
  btn.style.display = "block";
  let muted = false;
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    muted = !muted;
    song.muted = muted;
    btn.textContent = muted ? "🔇" : "🔊";
  });
  return song;
}

// ---- open sequence ----
let opened = false;
function open(song) {
  if (opened) return;
  opened = true;
  fillContent();
  $("main").classList.add("show");
  $("start").classList.add("hide");
  if (song) song.play().catch(() => {});
  // Honor reduced-motion: skip the falling-blooms animation entirely.
  if (!reduceMotion) {
    burst(28);
    setInterval(spawnBloom, 320);
  }
}

// ---- wire up ----
const song = setupMusic();
const start = $("start");
start.addEventListener("click", () => open(song));
start.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " " || e.code === "Space") { e.preventDefault(); open(song); }
});

// Exposed for automated tests (harmless in production).
window.MSARY = { CONFIG, ordinal, daysSince, monthsElapsed, monthCount, buildCounter, buildJournal, escapeHtml };
</script>
</body>
</html>
